name: CI

on:
  push:
    branches: [main]
  pull_request:

# Read-only CI: minimize the default GITHUB_TOKEN.
permissions:
  contents: read

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: typecheck · test · boundaries
    runs-on: ubuntu-latest

    # Ephemeral Postgres for the repository integration tests. No volume mount,
    # so the pg18 data-dir layout is a non-issue here.
    services:
      postgres:
        # Digest-pinned (postgres 18.4-alpine) for reproducible CI.
        image: postgres:18-alpine@sha256:1b1689b20d16a014a3d195653381cf2caa75a41a92d93b255a9d6ea29fd353aa
        env:
          POSTGRES_USER: bunbooru
          POSTGRES_PASSWORD: bunbooru
          POSTGRES_DB: bunbooru
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U bunbooru -d bunbooru"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://bunbooru:bunbooru@localhost:5432/bunbooru

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Migrate
        run: bun run migrate

      - name: Test
        run: bun run test

      - name: Architecture boundaries
        run: bun run lint:boundaries
